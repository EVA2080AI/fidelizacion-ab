<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AB Hub Plus | Premium Care</title>
    
    <!-- Modular Design System V8 -->
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- PWA Manifest & iOS Native Support -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0066b2">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="toast-container" style="position: fixed; top: calc(20px + env(safe-area-inset-top)); right: 24px; z-index: 10000;"></div>

    <!-- Login V8 -->
    <div id="login-screen" class="overlay glass-effect shadow-premium active">
        <div class="login-card ab-card glass-effect" style="border: none; text-align: center;">
            <div class="logo-mark" style="width: 72px; height: 72px; font-size: 1.8rem; margin: 0 auto 32px;">AB</div>
            <h1 style="font-size: 2rem; font-weight: 900; letter-spacing: -0.04em;">Advance Bionics</h1>
            <p style="color: var(--slate-500); margin-top: 8px;">Diseñado para el futuro de la audición.</p>
            
            <div style="margin-top: 40px; text-align: left;">
                <label style="color: var(--primary); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; display: block; margin-bottom: 8px;">USUARIO CLÍNICO</label>
                <input type="text" id="login-name" placeholder="Tu nombre" class="ab-input">
            </div>
            
            <div style="margin-top: 20px; text-align: left;">
                <label style="color: var(--primary); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; display: block; margin-bottom: 8px;">DISPOSITIVO ASOCIADO</label>
                <select id="login-device" class="ab-input" style="background-image: none;">
                    <option value="Naída CI M90">Naída CI M90</option>
                    <option value="Sky CI M90">Sky CI M90</option>
                    <option value="Naída CI Q90">Naída CI Q90</option>
                </select>
            </div>
            
            <button onclick="app.login()" class="ab-btn ab-btn-primary" style="margin-top: 40px; width: 100%;">Acceder al Hub Plus</button>
        </div>
    </div>

    <!-- Bridge & Onboarding -->
    <div id="bridge-splash" class="overlay glass-effect active" style="display: none;">
        <div class="ab-card glass-effect" style="padding: 48px; text-align: center;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 32px;">
                <i data-lucide="message-circle" style="width: 48px; height: 48px; color: #25D366;"></i>
                <div style="width: 40px; height: 1px; background: var(--slate-200);"></div>
                <div class="logo-mark" style="width: 48px; height: 48px;">AB</div>
            </div>
            <h2 style="font-weight: 900;">Sincronizando...</h2>
        </div>
    </div>

    <div id="onboarding-overlay" class="overlay glass-effect">
        <div class="onboarding-card ab-card glass-effect shadow-premium">
            <div style="text-align: center;">
                <div style="background: var(--blue-50); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                    <i data-lucide="award" style="width: 40px; height: 40px; color: var(--primary);"></i>
                </div>
                <h2 style="font-weight: 900; margin-bottom: 16px;">Diseño de Fidelidad</h2>
                <p style="color: var(--slate-500);">Gana puntos cuidando tu procesador y desbloquea beneficios exclusivos.</p>
                <button class="ab-btn ab-btn-primary" style="width: 100%; margin-top: 32px;" onclick="app.finishOnboarding()">Entendido</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Desktop Sidebar -->
        <nav class="main-nav desktop-only glass-effect" style="border-radius: 0; box-shadow: none; border: none; border-right: 1px solid var(--slate-200);">
            <div class="logo-container">
                <div class="logo-mark">AB</div>
                <span style="font-weight: 800; font-size: 1.1rem; color: var(--primary);">Hub Plus</span>
            </div>
            
            <div class="loyalty-widget shadow-premium">
                <div class="ab-badge" id="sidebar-tier" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white;">BRONCE</div>
                <div style="font-size: 1.8rem; font-weight: 900; margin-top: 12px;"><span id="sidebar-points">0</span> <small style="font-size: 0.8rem; opacity: 0.8;">PTS</small></div>
                <div style="height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; margin-top: 16px; overflow: hidden;">
                    <div id="loyalty-progress-fill" style="height: 100%; background: white; width: 0%; transition: width 0.5s ease;"></div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="nav-item" data-view="home"><i data-lucide="layout-dashboard"></i><span>Panel</span></button>
                <button class="nav-item" data-view="benefits"><i data-lucide="award"></i><span>Premios</span></button>
                <button class="nav-item" data-view="care"><i data-lucide="activity"></i><span>Técnico</span></button>
                <button class="nav-item active" data-view="assistant"><i data-lucide="message-square"></i><span>Melody</span></button>
                <button class="nav-item" data-view="profile"><i data-lucide="user"></i><span>Perfil</span></button>
            </div>
        </nav>

        <!-- Main Workspace -->
        <main id="main-content">
            <header class="mobile-header glass-effect mobile-only shadow-premium" style="border: none; border-bottom: 1px solid var(--slate-100);">
                <div class="logo-mark" style="width: 32px; height: 32px; font-size: 0.8rem;">AB</div>
                <div class="ab-badge success" id="mobile-tier">BRONCE</div>
            </header>
            <!-- Content -->
        </main>

        <!-- iPhone Pro Floating Nav -->
        <nav class="bottom-nav mobile-only glass-effect shadow-premium">
            <button class="nav-item" data-view="home"><i data-lucide="layout-dashboard"></i></button>
            <button class="nav-item" data-view="benefits"><i data-lucide="award"></i></button>
            <button class="nav-item" data-view="care"><i data-lucide="activity"></i></button>
            <button class="nav-item active" data-view="assistant"><i data-lucide="message-square"></i></button>
            <button class="nav-item" data-view="profile"><i data-lucide="user"></i></button>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
