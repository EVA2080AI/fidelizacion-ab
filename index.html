<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AB Command Center | Enterprise</title>
    
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="enterprise-layout">
    <div id="toast-container"></div>

    <!-- Login V11 (Enterprise Auth) -->
    <div id="login-screen" class="overlay active">
        <div class="login-card ab-card glass-effect shadow-premium">
            <div class="logo-mark" style="width: 64px; height: 64px; font-size: 1.5rem; margin: 0 auto 24px;">AB</div>
            <h1 style="font-size: 1.75rem; font-weight: 900;">Command Center</h1>
            <p style="color: var(--slate-500); margin-top: 4px;">Selecciona tu perfil de acceso.</p>
            
            <div style="margin-top: 32px; text-align: left;">
                <label class="field-label">NOMBRE DE USUARIO</label>
                <input type="text" id="login-name" placeholder="Ej. Juan Pérez" class="ab-input">
            </div>

            <div style="margin-top: 16px; text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <label class="field-label">ROL</label>
                    <select id="login-role" class="ab-input">
                        <option value="CLIENTE">Paciente</option>
                        <option value="ESPECIALISTA">Especialista</option>
                        <option value="DISTRIBUIDOR">Distribuidor</option>
                        <option value="ADMIN">Meta Usuario</option>
                    </select>
                </div>
                <div>
                    <label class="field-label">PAÍS</label>
                    <select id="login-country" class="ab-input">
                        <option value="COL">🇨🇴 Colombia</option>
                        <option value="MEX">🇲🇽 México</option>
                        <option value="ARG">🇦🇷 Argentina</option>
                        <option value="CRI">🇨🇷 Costa Rica</option>
                    </select>
                </div>
            </div>
            
            <button onclick="app.login()" class="ab-btn ab-btn-primary" style="margin-top: 32px; width: 100%;">Entrar al Sistema</button>
        </div>
    </div>

    <!-- PWA / App Shell -->
    <div class="app-shell" style="display: none;">
        <!-- Persistent Side Chat (Desktop) -->
        <aside class="chat-sidebar desktop-only glass-effect">
            <div class="sidebar-header">
                <div class="status-dot"></div>
                <span style="font-weight: 800; font-size: 0.9rem;">MELODY CLÍNICA</span>
            </div>
            <div id="sidebar-chat-messages" class="chat-messages-container"></div>
            <div class="chat-input-row">
                <input type="text" id="sidebar-ai-input" placeholder="Consultar sistema..." onkeypress="if(event.key==='Enter')app.sendMessageSidebar()">
                <button onclick="app.sendMessageSidebar()" class="send-btn"><i data-lucide="send"></i></button>
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <div class="main-workspace">
            <!-- Global Top Nav -->
            <header class="global-header glass-effect">
                <div class="header-left">
                    <div class="logo-mark" style="width: 32px; height: 32px; font-size: 0.8rem;">AB</div>
                    <div class="country-badge" id="current-country-badge">COL</div>
                    <div class="role-badge" id="current-role-badge">CLIENTE</div>
                </div>
                <div class="header-right">
                    <div class="header-user" onclick="app.switchView('profile')">
                        <span id="header-user-name">Usuario</span>
                        <div class="user-avatar">?</div>
                    </div>
                </div>
            </header>

            <main id="main-content">
                <!-- Content injected here via renderRoleView() -->
            </main>

            <!-- Bottom Nav (Mobile) -->
            <nav class="bottom-nav mobile-only glass-effect">
                <button class="nav-item" data-view="home"><i data-lucide="layout-dashboard"></i></button>
                <button class="nav-item" data-view="chat"><i data-lucide="message-square"></i></button>
                <button class="nav-item" data-view="tools" id="dynamic-nav-tool"><i data-lucide="briefcase"></i></button>
                <button class="nav-item" data-view="profile"><i data-lucide="user"></i></button>
            </nav>
        </div>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
